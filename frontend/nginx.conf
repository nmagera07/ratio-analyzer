server {
    listen 8080;

    location /api/ {
        proxy_pass https://ratio-api-1056739524668.us-central1.run.app/;
        proxy_set_header Host ratio-api-1056739524668.us-central1.run.app;
        proxy_ssl_server_name on;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
